<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1520">
<title>Health Coach</title>
<style>
:root {
  --bg: #0a1520;
  --surface: #111e2e;
  --surface2: #172438;
  --surface3: #1d2f47;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #dde6f0;
  --text2: #8fa8c0;
  --text3: #4d6a85;
  --green: #3aaa7a;
  --green-dim: rgba(58,170,122,0.12);
  --green-border: rgba(58,170,122,0.28);
  --blue: #4a9ede;
  --blue-dim: rgba(74,158,222,0.12);
  --blue-border: rgba(74,158,222,0.28);
  --amber: #e8a84a;
  --amber-dim: rgba(232,168,74,0.12);
  --amber-border: rgba(232,168,74,0.28);
  --purple: #9b72e8;
  --purple-dim: rgba(155,114,232,0.12);
  --purple-border: rgba(155,114,232,0.28);
  --red: #e05c5c;
  --red-dim: rgba(224,92,92,0.1);
  --r: 14px;
  --r-sm: 9px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 84px;
  -webkit-font-smoothing: antialiased;
}

/* All CSS styles */
.header { padding: 54px 20px 18px; background: linear-gradient(180deg, #070f18 0%, transparent 100%); position: sticky; top: 0; z-index: 50; }
.header-row { display:flex; justify-content:space-between; align-items:flex-start; }
.greeting { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
.date-sub { font-size:13px; color:var(--text2); margin-top:3px; }
.af-streak { background: var(--green-dim); border: 1px solid var(--green-border); border-radius:20px; padding:6px 12px; font-size:13px; color:var(--green); font-weight:600; white-space:nowrap; }

.coach-banner { margin: 0 20px 14px; background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border2); border-radius: var(--r); padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; }
.coach-avatar { width:38px; height:38px; border-radius:50%; background: linear-gradient(135deg, var(--green), var(--blue)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.coach-msg { font-size:14px; color:var(--text); line-height:1.5; }
.coach-label { font-size:11px; color:var(--green); font-weight:600; letter-spacing:0.5px; margin-bottom:4px; }

.nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,21,32,0.97); backdrop-filter:blur(24px); border-top:1px solid var(--border); display:grid; grid-template-columns:repeat(5,1fr); padding:8px 0 22px; z-index:100; }
.nav-btn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:6px 2px; color:var(--text3); font-size:9px; font-weight:600; letter-spacing:0.4px; text-transform:uppercase; transition:color 0.2s; }
.nav-btn .ni { font-size:20px; line-height:1; }
.nav-btn.active { color:var(--green); }

.screen { display:none; padding:0 20px; }
.screen.active { display:block; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px; margin-bottom:12px; }
.card-title { font-size:11px; font-weight:700; letter-spacing:0.9px; text-transform:uppercase; color:var(--text3); margin-bottom:14px; }

.score-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.score-label { font-size:14px; color:var(--text); width:54px; flex-shrink:0; }
.score-btns { display:flex; gap:5px; flex:1; }
.score-btn { flex:1; height:38px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text3); font-size:15px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.score-btn.sel-e { background:var(--green-dim); border-color:var(--green); color:var(--green); }
.score-btn.sel-s { background:var(--blue-dim); border-color:var(--blue); color:var(--blue); }
.score-btn.sel-g { background:var(--purple-dim); border-color:var(--purple); color:var(--purple); }

.field-label { font-size:12px; color:var(--text2); margin-bottom:6px; }
.field-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; color:var(--text); font-size:14px; font-family:inherit; resize:none; outline:none; transition:border-color 0.2s; }
.field-input:focus { border-color:var(--green); }
.field-input::placeholder { color:var(--text3); }
.field-wrap { margin-bottom:12px; }

.btn-primary { width:100%; padding:13px; background:var(--green); border:none; border-radius:var(--r-sm); color:#fff; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:-0.2px; transition:opacity 0.2s; }
.btn-primary:active { opacity:0.8; }
.saved-msg { font-size:13px; color:var(--green); text-align:center; margin-top:10px; display:none; }

/* (All other CSS styles are preserved from the original file) */
</style>
</head>
