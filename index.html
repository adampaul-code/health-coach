<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Health Coach</title>
<style>
:root {
  --bg: #0a1520;
  --surface: #111e2e;
  --surface2: #172438;
  --surface3: #1d2f47;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #dde6f0;
  --text2: #8fa8c0;
  --text3: #4d6a85;
  --green: #3aaa7a;
  --green-dim: rgba(58,170,122,0.12);
  --green-border: rgba(58,170,122,0.28);
  --blue: #4a9ede;
  --blue-dim: rgba(74,158,222,0.12);
  --blue-border: rgba(74,158,222,0.28);
  --amber: #e8a84a;
  --amber-dim: rgba(232,168,74,0.12);
  --amber-border: rgba(232,168,74,0.28);
  --purple: #9b72e8;
  --purple-dim: rgba(155,114,232,0.12);
  --purple-border: rgba(155,114,232,0.28);
  --red: #e05c5c;
  --red-dim: rgba(224,92,92,0.1);
  --r: 14px;
  --r-sm: 9px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 84px;
  -webkit-font-smoothing: antialiased;
}

/* All original CSS styles (shortened for this response - the full version is in the download) */
.header { padding: 54px 20px 18px; background: linear-gradient(180deg, #070f18 0%, transparent 100%); position: sticky; top: 0; z-index: 50; }

</style>
</head>

<!-- In the Gut panel, after the "Managing your bloating" card, I added this: -->

<div class="card">
  <div class="card-title">Probiotic Foods Checklist</div>
  <div class="supp-row" onclick="toggleGutFood('kefir')">
    <div class="supp-icon" style="background:var(--purple-dim)">🥛</div>
    <div class="supp-info">
      <div class="supp-name">Kefir</div>
      <div class="supp-time">150ml daily</div>
    </div>
    <div class="supp-check" id="chk-kefir"></div>
  </div>
  <div class="supp-row" onclick="toggleGutFood('yoghurt')">
    <div class="supp-icon" style="background:var(--purple-dim)">🫙</div>
    <div class="supp-info">
      <div class="supp-name">Live Greek Yoghurt</div>
      <div class="supp-time">Daily with breakfast</div>
    </div>
    <div class="supp-check" id="chk-yoghurt"></div>
  </div>
  <div class="supp-row" onclick="toggleGutFood('kombucha')">
    <div class="supp-icon" style="background:var(--purple-dim)">🍵</div>
    <div class="supp-info">
      <div class="supp-name">Kombucha</div>
      <div class="supp-time">2-3 times per week</div>
    </div>
    <div class="supp-check" id="chk-kombucha"></div>
  </div>
  <div class="supp-row" onclick="toggleGutFood('miso')">
    <div class="supp-icon" style="background:var(--purple-dim)">🍜</div>
    <div class="supp-info">
      <div class="supp-name">Miso</div>
      <div class="supp-time">As soup or dressing</div>
    </div>
    <div class="supp-check" id="chk-miso"></div>
  </div>
</div>
