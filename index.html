<title>Health Coach</title>
<style>
:root {
  --bg: #0a1520;
  --surface: #111e2e;
  --surface2: #172438;
  --surface3: #1d2f47;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #dde6f0;
  --text2: #8fa8c0;
  --text3: #4d6a85;
  --green: #3aaa7a;
  --green-dim: rgba(58,170,122,0.12);
  --green-border: rgba(58,170,122,0.28);
  --blue: #4a9ede;
  --blue-dim: rgba(74,158,222,0.12);
  --blue-border: rgba(74,158,222,0.28);
  --amber: #e8a84a;
  --amber-dim: rgba(232,168,74,0.12);
  --amber-border: rgba(232,168,74,0.28);
  --purple: #9b72e8;
  --purple-dim: rgba(155,114,232,0.12);
  --purple-border: rgba(155,114,232,0.28);
  --red: #e05c5c;
  --red-dim: rgba(224,92,92,0.1);
  --r: 14px;
  --r-sm: 9px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: 84px;
  -webkit-font-smoothing: antialiased;
}

/* All the rest of the original CSS, HTML and JavaScript are preserved below */
.header {
  padding: 54px 20px 18px;
  background: linear-gradient(180deg, #070f18 0%, transparent 100%);
  position: sticky; top: 0; z-index: 50;
}
.header-row { display:flex; justify-content:space-between; align-items:flex-start; }
.greeting { font-size:24px; font-weight:700; letter-spacing:-0.5px; }
.date-sub { font-size:13px; color:var(--text2); margin-top:3px; }
.af-streak {
  background: var(--green-dim);
  border: 1px solid var(--green-border);
  border-radius:20px; padding:6px 12px;
  font-size:13px; color:var(--green); font-weight:600;
  white-space:nowrap;
}

.coach-banner {
  margin: 0 20px 14px;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; gap: 12px; align-items: flex-start;
}
.coach-avatar {
  width:38px; height:38px; border-radius:50%;
  background: linear-gradient(135deg, var(--green), var(--blue));
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.coach-msg { font-size:14px; color:var(--text); line-height:1.5; }
.coach-label { font-size:11px; color:var(--green); font-weight:600; letter-spacing:0.5px; margin-bottom:4px; }
